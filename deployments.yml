apiVersion: apps/v1
kind: Deployment
metadata:
  name: mywebdeployment
  labels:
    app: myweb

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myweb

  template:
    metadata:
      labels:
        app: myweb

    spec:
      containers:
      - name: myweb
        image: parag1014/myimage_1
        ports:
        - containerPort: 8080
