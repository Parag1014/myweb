apiVersion: apps/v1
kind: Deployment
metadata:
  name: mywebdeployment
  labels:
    app: myweb

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myweb

  template:
    metadata:
      labels:
        app: myweb

    spec:
      containers:
      - name: myweb
        image: parag1014/myimage_4
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: mywebservice

spec:
  type: NodePort

  selector:
    app: myweb

  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30007
